<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Precios - Autoservicio Juani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00388c">
<link rel="apple-touch-icon" href="icon.png">
    
</head>
<body class="bg-gray-950 text-gray-100 font-sans h-screen overflow-hidden flex flex-col justify-center items-center select-none">

    <!-- Entrada oculta para el lector USB -->
    <input type="text" id="scanner-input" class="absolute -top-40 opacity-0 pointer-events-none" autofocus />

    <div id="contenedor-kiosco" class="w-full max-w-5xl px-8 text-center transition-all duration-300">
        
        <!-- Estado 1: Reposo -->
        <div id="estado-reposo" class="block space-y-8 animate-pulse">
            <div class="text-7xl font-extrabold tracking-tight text-emerald-400">AUTOSERVICIO JUANI</div>
            <div class="text-4xl text-gray-400 font-medium">Por favor, pase el código de barras por el lector</div>
            <div class="text-9xl mt-8 text-emerald-500/20">█║▌│█│║▌║││█║▌</div>
        </div>

        <!-- Estado 2: Buscando -->
        <div id="estado-buscando" class="hidden space-y-6">
            <div class="text-4xl text-gray-400">Procesando artículo...</div>
            <div class="inline-block w-16 h-16 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin"></div>
        </div>

        <!-- Estado 3: Resultado -->
        <div id="estado-resultado" class="hidden space-y-8 text-left bg-gray-900 p-12 rounded-3xl border border-gray-800 shadow-2xl">
            <div class="flex justify-between items-start border-b border-gray-800 pb-6">
                <div>
                    <h1 id="prod-descripcion" class="text-5xl font-black tracking-tight text-white uppercase">Cargando...</h1>
                    <p id="prod-rubro" class="text-xl text-gray-500 font-semibold mt-2 tracking-wide">FIAMBRERIA</p>
                </div>
                <div id="badge-promo" class="hidden bg-amber-500 text-gray-950 px-6 py-2 rounded-full font-black text-xl tracking-wider animate-bounce">
                    ¡OFERTA ACTIVA!
                </div>
            </div>
            
            <div class="flex flex-col space-y-2">
                <span class="text-2xl font-bold text-gray-400 uppercase tracking-widest">Precio de Venta</span>
                <span id="prod-precio" class="text-8xl font-black text-emerald-400 tracking-tight">$0.00</span>
            </div>
        </div>

        <!-- Estado 4: Error -->
        <div id="estado-error" class="hidden space-y-4">
            <div class="text-8xl">⚠️</div>
            <div id="error-mensaje" class="text-4xl font-bold text-red-400">Producto no encontrado</div>
            <div class="text-xl text-gray-500">Intente escanear nuevamente</div>
        </div>
    </div>

    <script>
        const input = document.getElementById('scanner-input');
        let timeoutRetorno = null;

        // Foco perpetuo
        document.addEventListener('click', () => input.focus());
        document.addEventListener('keydown', () => { if(document.activeElement !== input) input.focus(); });

        const misHeaders = {
            "Authorization": "Basic QUQxMTE0OCRpcG9zc2IzYXI6R1VTVEkxMA==",
            "emp_codigo": "11148",
            "gestion": "1222",
            "Content-Type": "application/json"
        };

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const codigo = input.value.trim();
                input.value = '';
                if (codigo) ejecutarFlujoConsulta(codigo);
            }
        });

        async function ejecutarFlujoConsulta(codigo) {
            clearTimeout(timeoutRetorno);
            mostrarEstado('buscando');

            try {
                const esPlu = codigo.length <= 6;
                const filtro = esPlu ? `codigoExterno%3AEQ%3A${codigo}` : `codigoBarras%3AEQ%3A${codigo}`;
                
                const r1 = await fetch(`https://backend-k8.scanntech.com/be-modulos-precios-angular-2.132.30-MINARG/api/datos-basicos-articulos?filter=${filtro}`, { headers: misHeaders });
                const d1 = await r1.json();

                if (!d1 || d1.length === 0) throw new Error("El artículo no existe");
                const idInterno = d1[0].codigo;

                const r2 = await fetch(`https://backend-k8.scanntech.com/be-modulos-precios-angular-2.132.30-MINARG/api/articulos/${idInterno}?disponibilidadDistribucion=%7B%22fecha%22:null,%22tipoDisponibilidadDistribucion%22:%22IMMEDIATE%22%7D&filter=codigoListaPrecioVenta%253AEQ%253A3163`, { headers: misHeaders });
                const d2 = await r2.json();

                renderizarResultado(d2);
            } catch (err) {
                document.getElementById('error-mensaje').innerText = err.message;
                mostrarEstado('error');
                programarRegreso(4000);
            }
        }

        function renderizarResultado(producto) {
            const infoLocal = producto.apertura?.['1222'] || producto;
            
            document.getElementById('prod-descripcion').innerText = producto.descripcion || "Sin Descripción";
            document.getElementById('prod-rubro').innerText = producto.rubro?.descripcion || "GENERAL";
            
            const precioVenta = parseFloat(infoLocal.venta?.valor || 0);
            document.getElementById('prod-precio').innerText = `$ ${precioVenta.toLocaleString('es-AR', { minimumFractionDigits: 2 })}`;

            const tienePromo = infoLocal.oferta && infoLocal.oferta.precio !== null;
            const badgePromo = document.getElementById('badge-promo');
            if (tienePromo) {
                badgePromo.classList.remove('hidden');
                const precioPromo = parseFloat(infoLocal.oferta.precio);
                document.getElementById('prod-precio').innerHTML = `
                    <span class="text-3xl line-through text-gray-600 block">$ ${precioVenta.toLocaleString('es-AR')}</span>
                    <span class="text-amber-400">$ ${precioPromo.toLocaleString('es-AR', { minimumFractionDigits: 2 })}</span>
                `;
            } else {
                badgePromo.classList.add('hidden');
            }

            mostrarEstado('resultado');
            programarRegreso(6000);
        }

        function mostrarEstado(estado) {
            ['reposo', 'buscando', 'resultado', 'error'].forEach(est => {
                document.getElementById(`estado-${est}`).classList.add('hidden');
            });
            document.getElementById(`estado-${estado}`).classList.remove('hidden');
        }

        function programarRegreso(ms) {
            timeoutRetorno = setTimeout(() => {
                mostrarEstado('reposo');
                input.focus();
            }, ms);
        }
    </script>
</body>
</html>
